name: Repository Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install networking tools
        run: sudo apt-get update && sudo apt-get install -y iproute2 net-tools iperf3
      - name: Check Python syntax
        run: python3 -m py_compile scripts/run_benchmark.py

      - name: Check Bash script syntax
        run: bash -n scripts/run_benchmark.sh

      - name: Verify project structure
        run: |
          test -f CUDA-Benchmark/benchmark.cu
          test -f scripts/run_benchmark.py
          test -f scripts/run_benchmark.sh
          test -f docs/networking-notes.md
          test -f README.md
          test -f network_tests/run_socket_inspection.sh
          test -f network_tests/check_socket_output.py
          test -f network_tests/run_real_network_test.sh
          test -f network_tests/analyze_network.py
          test -f network_tests/run_iperf_local.sh
          test -f network_tests/check_iperf_output.py
          
      - name: Validate mock benchmark output
        run: python3 scripts/check_benchmark_output.py test/mock_benchmark_output.txt

      - name: Validate mock network output
        run: python3 network_tests/check_network_output.py network_tests/mock_network_output.txt
    
      - name: Run real network test
        run: bash network_tests/run_real_network_test.sh

      - name: Analyze real network output
        run: python3 network_tests/analyze_network.py

      - name: Run socket inspection
        run: bash network_tests/run_socket_inspection.sh

      - name: Validate socket inspection output
        run: python3 network_tests/check_socket_output.py

      - name: Run iperf test
        run: bash network_tests/run_iperf_local.sh

      - name: Validate iperf output
        run: python3 network_tests/check_iperf_output.py
